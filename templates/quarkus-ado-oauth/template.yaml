apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: quarkus-ado-oauth
  title: Quarkus App — ADO OAuth (no PAT)
  description: >
    Creates an ADO repository, pipeline and registers in the catalog using OAuth2
    client_credentials token from the Service Principal. No fixed PAT.
  tags:
    - quarkus
    - azure-devops
    - oauth
spec:
  owner: group:default/developers
  type: service

  parameters:
    - title: Project information
      required:
        - appName
        - adoOrg
        - adoProject
      properties:
        appName:
          type: string
          title: Application name
          description: Name of the ADO repository to be created
          pattern: '^[a-z][a-z0-9-]{2,39}$'
          ui:autofocus: true
        adoOrg:
          type: string
          title: ADO Organization
          description: Azure DevOps organization name
          default: sandrotanaka
        adoProject:
          type: string
          title: ADO Project
          default: rhdh-demo
        description:
          type: string
          title: Description
          default: Quarkus application generated by Developer Hub

  steps:

    # ── 1. Get ADO token via client_credentials (Service Principal) ────────────
    # Authorization Basic passed explicitly in the header to prevent the
    # http:backstage:request plugin from overwriting it with the user's Bearer token.
    # Plugin behavior: if (token && !authToken) { inject Bearer }
    # Therefore: if the template already defines Authorization, the plugin respects it.
    #
    # The /azure-token proxy points to:
    #   https://login.microsoftonline.com/<TENANT_ID>/oauth2/v2.0
    # Tenant ID hardcoded in the proxy target — ${VAR} is not expanded in target field.
    # Basic hardcoded — proxy.headers does not expand environment variables.
    # Private repository — access restricted to the same group that operates ADO.
    - id: get-sp-token
      name: Get ADO OAuth Token (Service Principal)
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/azure-token/token
        headers:
          Content-Type: application/x-www-form-urlencoded
          Authorization: "Basic ZmEwNmVjNzktYWU2ZS00MjYxLTgyNjAtMzk2YjgwNjhkODJlOlJRcjhRfjZ5fllDLmFTOGN0ZnEwc1J5ZE9RdGlqMURDNV9rMUZhUFA="
        body: "grant_type=client_credentials&scope=499b84ac-1321-427f-aa17-267ca6975798%2F.default"

    # ── 2. Create repository in ADO ────────────────────────────────────────────
    - id: create-repo
      name: Create repository in Azure DevOps
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/azure-devops/${{ parameters.adoOrg }}/${{ parameters.adoProject }}/_apis/git/repositories?api-version=7.1
        headers:
          Authorization: Bearer ${{ steps['get-sp-token'].output.body.access_token }}
          Content-Type: application/json
        body:
          name: ${{ parameters.appName }}

    # ── 3. Clone empty repository ──────────────────────────────────────────────
    # The clone initializes local git correctly even with an empty repo,
    # solving the "Could not find HEAD" error in the subsequent push.
    # Validated pattern: clone → fetch:template → push using the same targetPath/sourcePath.
    - id: clone-repo
      name: Clone repository
      action: azure:repository:clone
      input:
        remoteUrl: ${{ steps['create-repo'].output.body.remoteUrl }}
        targetPath: ./repo
        token: ${{ steps['get-sp-token'].output.body.access_token }}

    # ── 4. Generate skeleton inside the cloned directory ──────────────────────
    - id: fetch-skeleton
      name: Generate Quarkus skeleton
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: ./repo
        values:
          appName: ${{ parameters.appName }}
          adoOrg: ${{ parameters.adoOrg }}
          adoProject: ${{ parameters.adoProject }}
          description: ${{ parameters.description }}
          repoUrl: ${{ steps['create-repo'].output.body.remoteUrl }}

    # ── 5. Push skeleton to the repository ────────────────────────────────────
    - id: push-content
      name: Push skeleton to repository
      action: azure:repository:push
      input:
        remoteUrl: ${{ steps['create-repo'].output.body.remoteUrl }}
        branch: main
        sourcePath: ./repo
        gitCommitMessage: "feat: initial commit via Developer Hub"
        token: ${{ steps['get-sp-token'].output.body.access_token }}

    # ── 6. Create pipeline in ADO ──────────────────────────────────────────────
    - id: create-pipeline
      name: Create pipeline in Azure DevOps
      action: http:backstage:request
      input:
        method: POST
        path: /proxy/azure-devops/${{ parameters.adoOrg }}/${{ parameters.adoProject }}/_apis/pipelines?api-version=7.1
        headers:
          Authorization: Bearer ${{ steps['get-sp-token'].output.body.access_token }}
          Content-Type: application/json
        body:
          name: ${{ parameters.adoOrg }}.${{ parameters.appName }}
          folder: /
          configuration:
            type: yaml
            path: azure-pipelines.yml
            repository:
              id: ${{ steps['create-repo'].output.body.id }}
              type: azureReposGit
              defaultBranch: refs/heads/main

    # ── 7. Run pipeline ────────────────────────────────────────────────────────
    # pipelineId must be a string — the | string filter converts the number returned
    # by the API to string, satisfying the azure:pipeline:run action schema.
    - id: run-pipeline
      name: Run pipeline
      action: azure:pipeline:run
      input:
        organization: ${{ parameters.adoOrg }}
        project: ${{ parameters.adoProject }}
        pipelineId: "${{ steps['create-pipeline'].output.body.id | string }}"
        branch: main
        token: ${{ steps['get-sp-token'].output.body.access_token }}

    # ── 8. Register in the Developer Hub catalog ───────────────────────────────
    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['create-repo'].output.body.remoteUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: Repository in Azure DevOps
        url: ${{ steps['create-repo'].output.body.remoteUrl }}
      - title: Pipeline
        url: ${{ steps['run-pipeline'].output.pipelineRunUrl }}
      - title: View in catalog
        icon: catalog
        entityRef: ${{ steps['register'].output.entityRef }}
