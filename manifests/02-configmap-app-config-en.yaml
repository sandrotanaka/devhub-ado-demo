# ──────────────────────────────────────────────────────────────────────────────
# 02-configmap-app-config.yaml
# Apply: oc apply -f 02-configmap-app-config.yaml -n devhub
# After applying: oc rollout restart deployment/backstage-developer-hub -n devhub
#
# Placeholders to replace:
#   <CLUSTER_DOMAIN>  — OCP cluster domain
#                       e.g.: cluster-2xq48.dynamic2.redhatworkshops.io
#   <AZURE_TENANT_ID> — Entra ID Tenant ID (in the azure-token proxy target field)
#                       e.g.: 60b50963-f5ed-4dd8-aa34-cc449ed7bcef
#   <ADO_ORG>         — Azure DevOps organization
#                       e.g.: sandrotanaka
#   <ADO_PROJECT>     — Azure DevOps project
#                       e.g.: rhdh-demo
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-app-config
  namespace: devhub
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub
      baseUrl: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>

    backend:
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
      baseUrl: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>
      cors:
        origin: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>
      allow:
        - host: dev.azure.com
        - host: login.microsoftonline.com
        - host: graph.microsoft.com

    # ── Microsoft Entra ID Authentication ─────────────────────────────────────
    auth:
      environment: production
      providers:
        microsoft:
          production:
            clientId: ${AZURE_CLIENT_ID}
            clientSecret: ${AZURE_CLIENT_SECRET}
            tenantId: ${AZURE_TENANT_ID}
            additionalScopes:
              - https://app.vssps.visualstudio.com/user_impersonation
            signIn:
              resolvers:
                - resolver: emailMatchingUserEntityAnnotation
                  dangerouslyAllowSignInWithoutUserInCatalog: true
    signInPage: microsoft

    # ── Azure Integration (Service Principal — ADO catalog reading) ────────────
    # The App Registration MUST be added as a user in the ADO org:
    #   https://dev.azure.com/<ADO_ORG>/_settings/users
    # Access level: Basic + Project Administrators
    integrations:
      azure:
        - host: dev.azure.com
          credentials:
            - clientId: ${AZURE_CLIENT_ID}
              clientSecret: ${AZURE_CLIENT_SECRET}
              tenantId: ${AZURE_TENANT_ID}

    # ── Azure DevOps ───────────────────────────────────────────────────────────
    azureDevOps:
      host: dev.azure.com
      organization: <ADO_ORG>

    # ── Proxy ──────────────────────────────────────────────────────────────────
    proxy:
      endpoints:
        # Proxy for ADO operations (create repo, pipeline, etc.)
        # allowedHeaders REQUIRED — without it the Bearer token is silently dropped
        /azure-devops:
          target: https://dev.azure.com
          changeOrigin: true
          allowedMethods: [GET, POST, DELETE, PATCH, PUT]
          credentials: dangerously-allow-unauthenticated
          allowedHeaders:
            - Authorization
            - Content-Type

        # Proxy for OAuth2 token acquisition via client_credentials
        # NOTE: Do NOT include Authorization here — the Basic header comes from the template
        # The template passes Authorization: Basic <base64> directly in the get-sp-token step,
        # preventing the http:backstage:request plugin from overwriting it with the user Bearer token.
        # LIMITATION: ${VAR} is NOT expanded in the target field — Tenant ID must be hardcoded
        /azure-token:
          target: https://login.microsoftonline.com/<AZURE_TENANT_ID>/oauth2/v2.0
          changeOrigin: true
          allowedMethods: [POST]
          credentials: dangerously-allow-unauthenticated
          allowedHeaders:
            - Authorization
            - Content-Type

    # ── Catalog ────────────────────────────────────────────────────────────────
    catalog:
      locations:
        - type: url
          target: https://dev.azure.com/<ADO_ORG>/<ADO_PROJECT>/_git/devhub-ado-demo?path=/all-templates.yaml&version=GBmain
