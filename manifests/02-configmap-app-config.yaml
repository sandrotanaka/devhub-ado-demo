# ──────────────────────────────────────────────────────────────────────────────
# 02-configmap-app-config.yaml
#
# EN:    Apply: oc apply -f 02-configmap-app-config.yaml -n devhub
#        After applying: oc rollout restart deployment/backstage-developer-hub -n devhub
# PT-BR: Aplicar: oc apply -f 02-configmap-app-config.yaml -n devhub
#        Após aplicar: oc rollout restart deployment/backstage-developer-hub -n devhub
#
# Placeholders:
#   <CLUSTER_DOMAIN>  — EN: OCP cluster domain
#                       PT-BR: domínio do cluster OCP
#                       ex: cluster-2xq48.dynamic2.redhatworkshops.io
#
#   <AZURE_TENANT_ID> — EN: Entra ID Tenant ID (azure-token proxy target field)
#                       PT-BR: Tenant ID do Entra ID (campo target do proxy azure-token)
#                       ex: 60b50963-f5ed-4dd8-aa34-cc449ed7bcef
#
#   <ADO_ORG>         — EN: Azure DevOps organization
#                       PT-BR: Organização Azure DevOps
#                       ex: sandrotanaka
#
#   <ADO_PROJECT>     — EN: Azure DevOps project
#                       PT-BR: Projeto Azure DevOps
#                       ex: rhdh-demo
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-app-config
  namespace: devhub
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub
      baseUrl: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>

    backend:
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
      baseUrl: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>
      cors:
        origin: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>
      allow:
        - host: dev.azure.com
        - host: login.microsoftonline.com
        - host: graph.microsoft.com

    # ── EN: Microsoft Entra ID Authentication ─────────────────────────────────
    # ── PT-BR: Autenticação Microsoft Entra ID ────────────────────────────────
    auth:
      environment: production
      providers:
        microsoft:
          production:
            clientId: ${AZURE_CLIENT_ID}
            clientSecret: ${AZURE_CLIENT_SECRET}
            tenantId: ${AZURE_TENANT_ID}
            additionalScopes:
              - https://app.vssps.visualstudio.com/user_impersonation
            signIn:
              resolvers:
                - resolver: emailMatchingUserEntityAnnotation
                  dangerouslyAllowSignInWithoutUserInCatalog: true
    signInPage: microsoft

    # ── EN: Azure Integration (Service Principal — ADO catalog reading) ────────
    # ── PT-BR: Integração Azure (Service Principal — leitura do catálogo ADO) ─
    # EN:    The App Registration MUST be added as a user in the ADO org:
    # PT-BR: O App Registration DEVE ser adicionado como usuário na org ADO:
    #   https://dev.azure.com/<ADO_ORG>/_settings/users
    # Access level: Basic + Project Administrators
    integrations:
      azure:
        - host: dev.azure.com
          credentials:
            - clientId: ${AZURE_CLIENT_ID}
              clientSecret: ${AZURE_CLIENT_SECRET}
              tenantId: ${AZURE_TENANT_ID}

    azureDevOps:
      host: dev.azure.com
      organization: <ADO_ORG>

    # ── Proxy ──────────────────────────────────────────────────────────────────
    proxy:
      endpoints:
        # EN:    Proxy for ADO operations — allowedHeaders REQUIRED
        # PT-BR: Proxy para operações ADO — allowedHeaders OBRIGATÓRIO
        /azure-devops:
          target: https://dev.azure.com
          changeOrigin: true
          allowedMethods: [GET, POST, DELETE, PATCH, PUT]
          credentials: dangerously-allow-unauthenticated
          allowedHeaders:
            - Authorization
            - Content-Type

        # EN:    Proxy for OAuth2 token acquisition via client_credentials
        #        Do NOT include Authorization here — the Basic header comes from the template
        #        The plugin sends the header before proxy processing — proxy Authorization is ignored
        #        LIMITATION: ${VAR} is NOT expanded in the target field — Tenant ID hardcoded
        # PT-BR: Proxy para obtenção de token OAuth2 via client_credentials
        #        NÃO incluir Authorization aqui — o header Basic vem do template
        #        O plugin envia o header antes do proxy — Authorization no proxy seria ignorado
        #        LIMITAÇÃO: ${VAR} não é expandido no campo target — Tenant ID hardcoded
        /azure-token:
          target: https://login.microsoftonline.com/<AZURE_TENANT_ID>/oauth2/v2.0
          changeOrigin: true
          allowedMethods: [POST]
          credentials: dangerously-allow-unauthenticated
          allowedHeaders:
            - Authorization
            - Content-Type

    # ── EN: Catalog / PT-BR: Catálogo ─────────────────────────────────────────
    catalog:
      locations:
        - type: url
          target: https://dev.azure.com/<ADO_ORG>/<ADO_PROJECT>/_git/devhub-ado-demo?path=/all-templates.yaml&version=GBmain
