# ──────────────────────────────────────────────────────────────────────────────
# 02-configmap-app-config.yaml
# Aplicar: oc apply -f 02-configmap-app-config.yaml -n devhub
# Após aplicar: oc rollout restart deployment/backstage-developer-hub -n devhub
#
# Placeholders a substituir:
#   <CLUSTER_DOMAIN> — domínio do cluster OCP
#                      ex: cluster-2xq48.dynamic2.redhatworkshops.io
#   <AZURE_TENANT_ID> — Tenant ID do Entra ID (no campo target do proxy azure-token)
#                       ex: 60b50963-f5ed-4dd8-aa34-cc449ed7bcef
#   <ADO_ORG>        — Organização Azure DevOps
#                       ex: sandrotanaka
#   <ADO_PROJECT>    — Projeto Azure DevOps
#                       ex: rhdh-demo
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: developer-hub-app-config
  namespace: devhub
data:
  app-config.yaml: |
    app:
      title: Red Hat Developer Hub
      baseUrl: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>

    backend:
      auth:
        keys:
          - secret: ${BACKEND_SECRET}
      baseUrl: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>
      cors:
        origin: https://backstage-developer-hub-devhub.apps.<CLUSTER_DOMAIN>
      allow:
        - host: dev.azure.com
        - host: login.microsoftonline.com
        - host: graph.microsoft.com

    # ── Autenticação Microsoft Entra ID ────────────────────────────────────────
    auth:
      environment: production
      providers:
        microsoft:
          production:
            clientId: ${AZURE_CLIENT_ID}
            clientSecret: ${AZURE_CLIENT_SECRET}
            tenantId: ${AZURE_TENANT_ID}
            additionalScopes:
              - https://app.vssps.visualstudio.com/user_impersonation
            signIn:
              resolvers:
                - resolver: emailMatchingUserEntityAnnotation
                  dangerouslyAllowSignInWithoutUserInCatalog: true
    signInPage: microsoft

    # ── Integração Azure (Service Principal — leitura do catálogo ADO) ─────────
    # O App Registration DEVE ser adicionado como usuário na org ADO:
    #   https://dev.azure.com/<ADO_ORG>/_settings/users
    # Access level: Basic + Project Administrators
    integrations:
      azure:
        - host: dev.azure.com
          credentials:
            - clientId: ${AZURE_CLIENT_ID}
              clientSecret: ${AZURE_CLIENT_SECRET}
              tenantId: ${AZURE_TENANT_ID}

    # ── Azure DevOps ───────────────────────────────────────────────────────────
    azureDevOps:
      host: dev.azure.com
      organization: <ADO_ORG>

    # ── Proxy ──────────────────────────────────────────────────────────────────
    proxy:
      endpoints:
        # Proxy para operações ADO (criar repo, pipeline, etc.)
        # allowedHeaders OBRIGATÓRIO — sem ele o Bearer token é descartado
        /azure-devops:
          target: https://dev.azure.com
          changeOrigin: true
          allowedMethods: [GET, POST, DELETE, PATCH, PUT]
          credentials: dangerously-allow-unauthenticated
          allowedHeaders:
            - Authorization
            - Content-Type

        # Proxy para obtenção de token OAuth2 via client_credentials
        # NOTA: Não incluir Authorization aqui — o header Basic vem do template
        # O template passa Authorization: Basic <base64> diretamente no step
        # get-sp-token, evitando que o plugin http:backstage:request sobrescreva
        # com o Bearer token do usuário.
        # LIMITAÇÃO: ${VAR} não é expandido no campo target — Tenant ID hardcoded
        /azure-token:
          target: https://login.microsoftonline.com/<AZURE_TENANT_ID>/oauth2/v2.0
          changeOrigin: true
          allowedMethods: [POST]
          credentials: dangerously-allow-unauthenticated
          allowedHeaders:
            - Authorization
            - Content-Type

    # ── Catálogo ───────────────────────────────────────────────────────────────
    catalog:
      locations:
        - type: url
          target: https://dev.azure.com/<ADO_ORG>/<ADO_PROJECT>/_git/devhub-ado-demo?path=/all-templates.yaml&version=GBmain
