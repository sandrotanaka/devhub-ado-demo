apiVersion: rhdh.redhat.com/v1alpha3
kind: Backstage
metadata:
  name: developer-hub
  namespace: devhub
spec:
  application:
    appConfig:
      mountPath: /opt/app-root/src
      configMaps:
        - name: developer-hub-app-config
    dynamicPluginsConfigMapName: developer-hub-dynamic-plugins
    extraEnvs:
      secrets:
        - name: developer-hub-env
    replicas: 1
    route:
      enabled: true
